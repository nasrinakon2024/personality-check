<!DOCTYPE html>
<html>
<head>
  <title>Breakup Decision Simulator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #333;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease;
    }

    h2 {
      margin-bottom: 15px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: #ff4d6d;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #e63950;
    }

    #progress {
      height: 8px;
      background: #eee;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    #bar {
      height: 100%;
      width: 0%;
      background: #ff4d6d;
      transition: 0.4s;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .result {
      font-size: 18px;
      margin-top: 20px;
      animation: fadeIn 1s ease;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>💔 Breakup Simulator</h2>

  <div id="progress">
    <div id="bar"></div>
  </div>

  <p id="question">Does your partner respect you?</p>

  <button onclick="answer('yes')">Yes</button>
  <button onclick="answer('no')">No</button>

  <div class="result" id="result"></div>
</div>

<script>
let step = 0;
let score = 0;

const questions = [
  "Does your partner respect you?",
  "Do you feel happy in the relationship?",
  "Does your partner communicate well?",
  "Do they support your goals?",
  "Do you feel valued?"
];

function answer(ans) {
  if(ans === 'yes') score++;

  step++;

  let progressPercent = (step / questions.length) * 100;
  document.getElementById("bar").style.width = progressPercent + "%";

  if(step < questions.length){
    document.getElementById("question").innerText = questions[step];
  } else {
    showResult();
  }
}

function showResult() {
  let percentage = Math.round((score / questions.length) * 100);
  let text = "";

  if(percentage >= 80){
    text = "❤️ Strong relationship! Keep growing together.";
  }
  else if(percentage >= 50){
    text = "💛 কিছু সমস্যা আছে, ঠিক করার চেষ্টা করো।";
  }
  else {
    text = "💔 You deserve better. Time to move on.";
  }

  document.getElementById("question").innerText = "Your Result:";
  document.getElementById("result").innerHTML = 
    "<b>Compatibility:</b> " + percentage + "%<br>" + text;
}
</script>

</body>
</html>
